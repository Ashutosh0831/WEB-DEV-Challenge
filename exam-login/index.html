    <script>
      let keybtn = document.querySelector(".key-btn");

      function togleDiv() {
        let smkey = document.querySelector(".simple-keyboard");
        if (smkey.style.display === "none") {
          smkey.style.display = "block";
        } else {
          smkey.style.display = "none";
        }
      }

      let Keyboard = window.SimpleKeyboard.default;

      let keyboard = new Keyboard({
        onChange: (input) => (document.querySelector("#input").value = input),
        onKeyPress: (button) => console.log(button),
      });
